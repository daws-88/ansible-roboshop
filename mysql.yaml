- name: setup mysql
  hosts: mysql
  become: yes
  tasks:
  - name: install mysql server
    ansible.builtin.package:
      name: mysql-server 
      state: present

  - name: strat and enable mysql
    ansible.builtin.service:
      name: mysql
      state: started
      enabled: yes

  - name: set up root password
    ansible.builtin.command: mysql_secure_installation --set-root-pass RoboShop@1