- name: setup shipping
  hosts: shipping
  become: yes
  tasks:
  - name: install maven
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: present
    loop:
    - maven 
    - mysql

  - name: create system user
    ansible.builtin.user:
      name: roboshop
      state: present
      shell: /usr/sbin/nologin
      comment: "roboshop system user"
      home: /app
      system: true

   # Safe to remove directory, because 2nd time if we run it will download freshly. no error if does not exist
  - name: remove directory
    ansible.builtin.file:
      path: /app
      state: absent

  - name: remove shipping  file
    ansible.builtin.file:
      path: /tmp/shipping.zip
      state: absent

  - name: create app direcrtory
    ansible.builtin.file:
      path: /app
      state: directory

  
  - name: download shipping  applications
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/shipping.-v3.zip 
      dest: /tmp/shipping.zip 

  - name: extract  application
    ansible.builtin.unarchive:
      src: /tmp/shipping.zip
      dest: /app
      remote_src: yes

  - name: Install packages and dependencies
    ansible.builtin.command: mvn clean package 
    args:
      chdir: /app

  - name: Move .jar file
    ansible.builitin.command: mv target/shipping-1.0.jar shipping.jar 
 `  args:
      chdir: /app
    
  - name: Copy configuration file to remote host
    ansible.builtin.copy:
    src: shipping.service
    dest: vim /etc/systemd/system/shipping.service

  - name: Import the SQL file into the 'shipping_db' database
    community.mysql.mysql_db:
      name: all
      state: import
      login_user: root
      login_host: daws88s.fun
      login_password: RoboShop@1
      target: "{{ item }}"
    loop:
    - < /app/db/schema.sql
    - < /app/db/app-user.sql 
    - < /app/db/master-data.sql

  - name: daemon reload enable and start
    ansible.builtin.systemd_service:
      name: shipping
      enabled: true
      state: started
      daemon_reload: true
        