- name: setup user
  hosts: user
  become: yes
  tasks:
  - name: disable nodejs
    ansible.builtin.command: dnf module disable nodejs -y

  - name: enable  nodejs
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs
    ansible.builtin.package:
      name: nodejs 
      state: present

  - name: create system user
    ansible.builtin.user:
      name: roboshop
      state: present
      shell: /usr/sbin/nologin
      comment: "roboshop system user"
      home: /app
      system: true
  # Safe to remove directory, because 2nd time if we run it will download freshly. no error if does not exist
  - name: remove directory
    ansible.builtin.file:
      path: /app
      state: absent

  - name: remove catalogue file
    ansible.builtin.file:
      path: /tmp/cart.zip
      state: absent

  - name: create app direcrtory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: download catalogue applications
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/cart.-v3.zip 
      dest: /tmp/cart.zip 

  - name: extract  application
    ansible.builtin.unarchive:
      src: /tmp/cart.zip
      dest: /app
      remote_src: yes

  - name: Install packages and dependencies based on package.json
    community.general.npm:
      path: /app

  - name: copying service file
    ansible.builtin.copy:
      src: cart.service
      dest: /etc/systemd/system/cart.service

  - name: daemon reload enable and start
    ansible.builtin.systemd_service:
      name: cart
      enabled: true
      state: started
      daemon_reload: true