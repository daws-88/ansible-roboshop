- name: Setup Redis Server
  hosts: redis
  become: yes
  tasks:

    - name: Disable default Redis module
      ansible.builtin.command: dnf module disable redis -y

    - name: Enable Redis 7 module
      ansible.builtin.command: dnf module enable redis:7 -y

    - name: Install Redis
      ansible.builtin.package:
        name: redis
        state: present

    - name: Allow remote connections
      ansible.builtin.replace:
        path: /etc/redis/redis.conf
        regexp: '^bind 127.0.0.1'
        replace: 'bind 0.0.0.0'

    - name: Disable protected mode
      ansible.builtin.lineinfile:
        path: /etc/redis/redis.conf
        regexp: '^protected-mode'
        line: 'protected-mode no'

    - name: Remove invalid test-memory line (fix fatal config error)
      ansible.builtin.lineinfile:
        path: /etc/redis/redis.conf
        regexp: '^test-memory'
        state: absent

    - name: Ensure Redis data directory exists with correct permissions
      ansible.builtin.file:
        path: /var/lib/redis
        state: directory
        owner: redis
        group: redis
        mode: '0770'

    - name: Start and enable Redis service
      ansible.builtin.service:
        name: redis
        state: started
        enabled: yes