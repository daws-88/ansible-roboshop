- name: setup rabbitmq
  hosts: rabbitmq
  become: yes
  tasks:
  - name: copy rabbitmq.repo
    ansible.builtin.copy:
    src: rabbitmq.repo
    dest: /etc/yum.repos.d/rabbitmq.repo

  - name: install rabbitmq server
    ansible.builtin.package:
      name: rabbitmq-server -y
      state: present

  - name: strat and enable rabbit mysql
    ansible.builtin.service:
    name: rabbitmq-server
    state: started
    enabled: yes

- name: crate user and assigin permissions to all queees
  community.rabbitmq.rabbitmq_user:
    user: roboshop 
    password: roboshop123
    permissions:
      - vhost: /
        configure_priv: .*
        read_priv: .*
        write_priv: .*
    state: present