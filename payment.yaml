- name: setup payment
  hosts: payment
  become: yes
  tasks:
  - name: install packages
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: present
      loop:
      - Python
      - gcc
      - python3-devel 

  - name: create system user
    ansible.builtin.user:
      name: roboshop
      state: present
      shell: /usr/sbin/nologin
      comment: "roboshop system user"
      home: /app
      system: true

   # Safe to remove directory, because 2nd time if we run it will download freshly. no error if does not exist
  - name: remove directory
    ansible.builtin.file:
      path: /app
      state: absent
  - name: remove payment  file
    ansible.builtin.file:
      path: /tmp/payment.zip
      state: absent

  - name: create app direcrtory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: download user  applications
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip
      dest: /tmp/payment.zip

  - name: extract  application
    ansible.builtin.unarchive:
      src: /tmp/payment.zip
      dest: /app
      remote_src: yes

  - name: Install packages based on pip3
    ansible.builtin.pip:
      requirements: requirements.txt
      executable: pip3
    args:
      chdir: /app

  - name: copying payment file
    ansible.builtin.copy:
      src: payment.service
      dest: /etc/systemd/system/payment.service

  - name: daemon reload enable and start
    ansible.builtin.systemd_service:
      name: user
      enabled: true
      state: started
      daemon_reload: true