- name: setup catalogue
  hosts: catalogue
  become: yes
  tasks:
  - name: disable nodejs
    ansible.builtin.command: dnf module disable nodejs -y

  - name: enable  nodejs
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs
    ansible.builtin.package:
      name: nodejs -y
      state: present

  - name: create system user
    ansible.builtin.user:
      name: roboshop
      state: present
      shell: /usr/sbin/nologin
      comment: "roboshop system user"
      home: /app
      system: true

  - name: create app direcrtory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: download catalogue applications
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip 
      dest: /tmp/catalogue.zip 

  - name: unzipping application
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip 
      dest: /app
      remote_src: yes

  - name: Install packages and dependencies
    community.general.npm:
      path: /app

  - name: copying service file
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service

  - name: copy mongodb repo
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: install mongodb client
    ansible.builtin.package:
      name: mongodb-mongosh 
      state: present

  - name: connnect to mongodb
    ansible.builtin.command: mongosh mongodb.daws88s.fun --quiet --eval "db.getMongo().getDBNames().indexOf('catalogue')"
    register: catalogue_output

  - name: print catalogue_output
    ansible.builtin.debug:
      msg: "{{ catalogue_output }}"

  - name: load data into mongodb
    ansible.builtin.shell: mongosh --host mongodb.daws88s.fun </app/db/master-data.js
    when: catalogue_output.studout | int < 0